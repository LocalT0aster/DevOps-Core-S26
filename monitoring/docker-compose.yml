services:
  loki:
    image: grafana/loki:3.0.0
    command:
      - -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:3100/ready || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - monitoring
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    command:
      - -config.file=/etc/promtail/config.yml
    user: "0:0"
    depends_on:
      loki:
        condition: service_healthy
    ports:
      - "9080:9080"
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - promtail-data:/run/promtail
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -lc 'exec 3<>/dev/tcp/127.0.0.1/9080
          && printf "GET /ready HTTP/1.0\r\nHost: 127.0.0.1\r\n\r\n" >&3
          && grep -q "200 OK" <&3'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M
    networks:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.3.1
    depends_on:
      loki:
        condition: service_healthy
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set in monitoring/.env}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - monitoring
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.9.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=10GB
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:9090/-/healthy || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - monitoring
    restart: unless-stopped

  app-python:
    image: localt0aster/devops-app-py:1.12-dev
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./data/app-python:/data
    labels:
      logging: "promtail"
      app: "devops-python"
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:8000/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M
    networks:
      - monitoring
    restart: unless-stopped

  app-go:
    image: localt0aster/devops-app-go:1.12-dev
    # Re-enable local builds if Docker networking breaks behind the tun/VPN setup.
    # build:
    #   context: ../app_go
    #   network: host
    environment:
      HOST: "0.0.0.0"
      PORT: "8001"
    ports:
      - "8001:8001"
    volumes:
      - ./data/app-go:/data
    labels:
      logging: "promtail"
      app: "devops-go"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M
    networks:
      - monitoring
    restart: unless-stopped

  app-go-healthcheck:
    image: curlimages/curl:8.18.0
    command:
      - sh
      - -c
      - sleep infinity
    depends_on:
      - app-go
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://app-go:8001/health >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 32M
    networks:
      - monitoring
    restart: unless-stopped

volumes:
  loki-data:
  promtail-data:
  grafana-data:
  prometheus-data:

networks:
  monitoring:
