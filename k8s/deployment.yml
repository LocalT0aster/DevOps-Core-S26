apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app-py
  labels:
    app.kubernetes.io/name: devops-app-py
    app.kubernetes.io/part-of: devops-core-s26
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: devops-app-py
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devops-app-py
        app.kubernetes.io/part-of: devops-core-s26
    spec:
      containers:
        - name: devops-app-py
          image: localt0aster/devops-app-py:1.9-dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "5000"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
