apiVersion: v1
kind: Service
metadata:
  name: your-app-service
spec:
  type: NodePort
  selector:
    app: your-app  # Must match Deployment labels
  ports:
    - protocol: TCP
      port: 80        # Service port
      targetPort: 8000  # Container port
      nodePort: 30080   # Optional: specific node port (30000-32767)
