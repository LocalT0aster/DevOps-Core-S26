replicaCount: 1

image:
  tag: "1.12-dev"

deployment:
  revisionHistoryLimit: 2

env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "5000"

config:
  file:
    environment: "development"
  env:
    data:
      APP_ENV: "development"
      LOG_LEVEL: "debug"

podLabels:
  environment: dev

podAnnotations:
  lab13-sync-wave: "1"

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3
