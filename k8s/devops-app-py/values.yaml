replicaCount: 2
partOf: devops-core-s26

image:
  repository: localt0aster/devops-app-py
  tag: "1.12-dev"
  pullPolicy: IfNotPresent

containerPort: 5000

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

deployment:
  revisionHistoryLimit: 5
  strategy:
    maxSurge: 1
    maxUnavailable: 0

env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "5000"

config:
  mountPath: /config
  file:
    enabled: true
    appName: "devops-info-service"
    environment: "development"
    featureFlags:
      visitsCounter: true
      metrics: true
      configReloadDemo: true
  env:
    enabled: true
    data:
      APP_NAME: "devops-info-service"
      APP_ENV: "development"
      APP_CONFIG_PATH: "/config/config.json"
      APP_VISITS_PATH: "/data/visits"
      LOG_LEVEL: "info"

persistence:
  enabled: true
  mountPath: /data
  size: 100Mi
  storageClass: ""

secrets:
  enabled: true
  stringData:
    APP_USERNAME: "placeholder-user"
    APP_PASSWORD: "placeholder-password"

serviceAccount:
  create: true
  name: ""

vault:
  enabled: false
  role: "lab11-devops-app-py"
  secretPath: "secret/data/lab11/devops-app-py"
  templateFile: "app-config.env"

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

hooks:
  preInstall:
    enabled: true
    weight: -5
    deletePolicy: before-hook-creation,hook-succeeded
    image:
      repository: busybox
      tag: "1.37.0"
      pullPolicy: IfNotPresent
  postInstall:
    enabled: true
    weight: 5
    deletePolicy: before-hook-creation,hook-succeeded
    image:
      repository: curlimages/curl
      tag: "8.12.1"
      pullPolicy: IfNotPresent
    maxAttempts: 20
    retryIntervalSeconds: 3
