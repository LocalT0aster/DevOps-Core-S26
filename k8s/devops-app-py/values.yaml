replicaCount: 5
partOf: devops-core-s26

image:
  repository: localt0aster/devops-app-py
  tag: "1.9"
  pullPolicy: IfNotPresent

containerPort: 5000

nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

deployment:
  revisionHistoryLimit: 5
  strategy:
    maxSurge: 1
    maxUnavailable: 0

env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "5000"

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

hooks:
  preInstall:
    enabled: true
    weight: -5
    deletePolicy: before-hook-creation,hook-succeeded
    image:
      repository: busybox
      tag: "1.37.0"
      pullPolicy: IfNotPresent
  postInstall:
    enabled: true
    weight: 5
    deletePolicy: before-hook-creation,hook-succeeded
    image:
      repository: curlimages/curl
      tag: "8.12.1"
      pullPolicy: IfNotPresent
    maxAttempts: 20
    retryIntervalSeconds: 3
