replicaCount: 2

image:
  tag: "1.12"

deployment:
  revisionHistoryLimit: 10

env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "5000"

config:
  file:
    environment: "production"
    featureFlags:
      configReloadDemo: false
  env:
    data:
      APP_ENV: "production"
      LOG_LEVEL: "info"

podLabels:
  environment: prod

podAnnotations:
  lab13-sync-wave: "1"

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 3
  timeoutSeconds: 2
  failureThreshold: 3
