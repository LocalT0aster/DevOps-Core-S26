replicaCount: 5

image:
  tag: "1.12"

deployment:
  revisionHistoryLimit: 5

podAnnotations:
  lab14-version: "analysis-v1"

rollout:
  enabled: true
  strategy: canary
  canary:
    steps:
      - setWeight: 20
      - pause:
          duration: 15s
      - setWeight: 60
      - pause:
          duration: 15s
      - setWeight: 100
  analysis:
    enabled: true
    metricName: health-check
    startingStep: 1
    interval: 5s
    count: 1
    failureLimit: 0
    path: /health
    jsonPath: "{$.status}"
    expectedStatus: healthy
    timeoutSeconds: 5

service:
  type: ClusterIP
  port: 80
  targetPort: 5000
