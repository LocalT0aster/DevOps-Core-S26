---
docker_apt_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armhf
  ppc64le: ppc64el

docker_apt_arch: "{{ docker_apt_arch_map.get(ansible_facts['architecture'], ansible_facts['architecture']) }}"

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_user: "{{ ansible_user | default('ubuntu') }}"
docker_install_python_sdk: true
docker_completion_log_path: "/tmp/ansible-docker-role.log"
