---
- name: Manage Docker installation
  become: true
  tags:
    - docker_install
  block:
    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
        state: present
        update_cache: true

    - name: Ensure Docker keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: true

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_facts['distribution_release'] }} stable
        filename: docker
        state: present
        update_cache: true

    - name: Install Docker engine packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
      notify: Restart Docker

    - name: Install Docker Python SDK package
      ansible.builtin.apt:
        name: python3-docker
        state: present
      when: docker_install_python_sdk | bool

    - name: Mark Docker service as ready
      ansible.builtin.set_fact:
        docker_service_ready: true

  rescue:
    - name: Mark Docker install rescue as triggered
      ansible.builtin.set_fact:
        docker_install_rescue_triggered: true

    - name: Wait before retrying Docker apt setup
      ansible.builtin.pause:
        seconds: 10

    - name: Refresh apt cache before Docker retry
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0

    - name: Retry adding Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: true

    - name: Retry adding Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_facts['distribution_release'] }} stable
        filename: docker
        state: present
        update_cache: true

    - name: Retry installing Docker engine packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
      notify: Restart Docker

    - name: Retry installing Docker Python SDK package
      ansible.builtin.apt:
        name: python3-docker
        state: present
      when: docker_install_python_sdk | bool

    - name: Mark Docker service as ready after retry
      ansible.builtin.set_fact:
        docker_service_ready: true

  always:
    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      when: docker_service_ready | default(false)

    - name: Record Docker installation block completion
      ansible.builtin.lineinfile:
        path: "{{ docker_completion_log_path }}"
        line: >-
          docker installation block completed
          (rescue_triggered={{ docker_install_rescue_triggered | default(false) }})
        create: true
        mode: "0644"

- name: Manage Docker configuration
  become: true
  tags:
    - docker_config
  block:
    - name: Add deployment user to docker group
      ansible.builtin.user:
        name: "{{ docker_user }}"
        groups: docker
        append: true
      when: docker_user | length > 0

  always:
    - name: Record Docker configuration block completion
      ansible.builtin.lineinfile:
        path: "{{ docker_completion_log_path }}"
        line: docker configuration block completed
        create: true
        mode: "0644"
