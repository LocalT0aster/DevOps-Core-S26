---
- name: Check whether Compose file exists for wipe
  ansible.builtin.stat:
    path: "{{ web_app_compose_project_dir }}/{{ web_app_compose_file_name }}"
  register: web_app_wipe_compose_file
  become: true
  tags:
    - web_app_wipe

- name: Wipe web application deployment
  become: true
  when: web_app_wipe | bool
  tags:
    - web_app_wipe
  block:
    - name: Stop and remove Compose-managed containers
      community.docker.docker_compose_v2:
        project_src: "{{ web_app_compose_project_dir }}"
        files:
          - "{{ web_app_compose_file_name }}"
        state: absent
        remove_orphans: true
        remove_volumes: "{{ web_app_wipe_remove_volumes | bool }}"
      when: web_app_wipe_compose_file.stat.exists
      register: web_app_wipe_compose_down
      failed_when: false

    - name: Remove standalone web app container if present
      community.docker.docker_container:
        name: "{{ web_app_container_name }}"
        state: absent

    - name: Remove Compose file
      ansible.builtin.file:
        path: "{{ web_app_compose_project_dir }}/{{ web_app_compose_file_name }}"
        state: absent

    - name: Remove Compose project directory
      ansible.builtin.file:
        path: "{{ web_app_compose_project_dir }}"
        state: absent

    - name: Optionally remove deployed image
      community.docker.docker_image_remove:
        name: "{{ web_app_image }}"
        tag: "{{ web_app_image_tag }}"
        force: true
      when: web_app_wipe_remove_images | bool
      register: web_app_wipe_image_remove
      failed_when: false

  always:
    - name: Record web app wipe completion
      ansible.builtin.lineinfile:
        path: "{{ web_app_wipe_log_path }}"
        line: >-
          web_app wipe completed
          (requested={{ web_app_wipe | bool }},
          compose_file_present={{ web_app_wipe_compose_file.stat.exists | default(false) }},
          remove_images={{ web_app_wipe_remove_images | bool }},
          remove_volumes={{ web_app_wipe_remove_volumes | bool }})
        create: true
        mode: "0644"

    - name: Report web app wipe status
      ansible.builtin.debug:
        msg: >-
          Web app {{ web_app_name }} wipe completed.
          Project directory={{ web_app_compose_project_dir }}.
