---
common_packages:
  - ca-certificates
  - curl
  - git
  - htop
  - vim
  - python3-pip
  - python3-apt
  - tzdata

common_manage_timezone: true
common_timezone: "Etc/UTC"
common_completion_log_path: "/tmp/ansible-common-role.log"

common_managed_users:
  - name: "{{ ansible_user | default('ubuntu') }}"
    shell: "/bin/bash"
    create_home: true
