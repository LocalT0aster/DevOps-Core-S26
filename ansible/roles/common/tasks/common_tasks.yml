---
- name: Manage common packages
  become: true
  tags:
    - packages
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Mark common package rescue as triggered
      ansible.builtin.set_fact:
        common_packages_rescue_triggered: true

    - name: Refresh apt cache with fix-missing
      ansible.builtin.command:
        argv:
          - apt-get
          - update
          - --fix-missing
      changed_when: false

    - name: Retry apt cache update
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Retry common package installation
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

  always:
    - name: Record common packages block completion
      ansible.builtin.lineinfile:
        path: "{{ common_completion_log_path }}"
        line: >-
          packages block completed
          (rescue_triggered={{ common_packages_rescue_triggered | default(false) }})
        create: true
        mode: "0644"

- name: Set /etc/timezone
  ansible.builtin.copy:
    dest: /etc/timezone
    content: "{{ common_timezone }}\n"
    owner: root
    group: root
    mode: "0644"
  when: common_manage_timezone | bool

- name: Point /etc/localtime to selected timezone
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ common_timezone }}"
    dest: /etc/localtime
    state: link
    force: true
  when: common_manage_timezone | bool

- name: Manage common users
  become: true
  tags:
    - users
  block:
    - name: Ensure managed users exist
      ansible.builtin.user:
        name: "{{ item.name }}"
        state: "{{ item.state | default('present') }}"
        shell: "{{ item.shell | default('/bin/bash') }}"
        create_home: "{{ item.create_home | default(true) }}"
      loop: "{{ common_managed_users }}"
      loop_control:
        label: "{{ item.name }}"
      when: common_managed_users | length > 0

  always:
    - name: Record common users block completion
      ansible.builtin.lineinfile:
        path: "{{ common_completion_log_path }}"
        line: users block completed
        create: true
        mode: "0644"
