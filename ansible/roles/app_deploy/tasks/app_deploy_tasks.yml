---
- name: Validate required Docker Hub credentials
  ansible.builtin.assert:
    that:
      - app_deploy_dockerhub_username | string | length > 0
      - app_deploy_dockerhub_password | string | length > 0
    fail_msg: >-
      Missing Docker Hub credentials. Define dockerhub_username and one of:
      dockerhub_password or docker_api_token in ansible/group_vars/all.yml (vaulted).

- name: Log in to Docker Hub
  community.docker.docker_login:
    registry_url: https://index.docker.io/v1/
    username: "{{ app_deploy_dockerhub_username }}"
    password: "{{ app_deploy_dockerhub_password }}"
  no_log: true

- name: Pull application image
  community.docker.docker_image:
    name: "{{ app_deploy_docker_image }}:{{ app_deploy_docker_image_tag }}"
    source: pull
  register: app_deploy_image_pull
  notify: Restart App Container

- name: Check whether application container already exists
  community.docker.docker_container_info:
    name: "{{ app_deploy_container_name }}"
  register: app_deploy_container_info

- name: Stop existing container before replacement
  community.docker.docker_container:
    name: "{{ app_deploy_container_name }}"
    state: stopped
  when:
    - app_deploy_container_info.exists | bool
    - app_deploy_recreate_on_pull | bool
    - app_deploy_image_pull.changed
    - app_deploy_container_info.container is defined
    - app_deploy_container_info.container.State.Running | default(false)

- name: Remove old container before replacement
  community.docker.docker_container:
    name: "{{ app_deploy_container_name }}"
    state: absent
  when:
    - app_deploy_container_info.exists | bool
    - app_deploy_recreate_on_pull | bool
    - app_deploy_image_pull.changed

- name: Run application container
  community.docker.docker_container:
    name: "{{ app_deploy_container_name }}"
    image: "{{ app_deploy_docker_image }}:{{ app_deploy_docker_image_tag }}"
    command: "{{ app_deploy_container_command | default(omit) }}"
    state: started
    restart_policy: "{{ app_deploy_restart_policy }}"
    ports:
      - "{{ app_deploy_port }}:{{ app_deploy_container_internal_port }}"
    env: "{{ app_deploy_environment }}"

- name: Wait for application port
  ansible.builtin.wait_for:
    host: "{{ app_deploy_healthcheck_host }}"
    port: "{{ app_deploy_port | int }}"
    timeout: 60
    delay: 1
  delegate_to: "{{ app_deploy_healthcheck_delegate_to }}"
  become: false

- name: Verify application health endpoint
  ansible.builtin.uri:
    url: "http://{{ app_deploy_healthcheck_host }}:{{ app_deploy_port }}{{ app_deploy_healthcheck_path }}"
    method: GET
    status_code: 200
    return_content: true
    timeout: "{{ app_deploy_healthcheck_timeout | int }}"
  register: app_deploy_healthcheck
  retries: "{{ app_deploy_healthcheck_retries | int }}"
  delay: "{{ app_deploy_healthcheck_delay | int }}"
  until: app_deploy_healthcheck.status == 200
  failed_when: app_deploy_healthcheck.json.status | default("") != "healthy"
  delegate_to: "{{ app_deploy_healthcheck_delegate_to }}"
  become: false
