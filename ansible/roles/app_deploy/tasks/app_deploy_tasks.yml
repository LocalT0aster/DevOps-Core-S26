---
- name: Resolve Docker Hub auth secret
  ansible.builtin.set_fact:
    dockerhub_auth_secret: "{{ dockerhub_password | default(docker_api_token | default('')) }}"
  no_log: true

- name: Validate required Docker Hub credentials
  ansible.builtin.assert:
    that:
      - dockerhub_username is defined
      - dockerhub_username | string | length > 0
      - dockerhub_auth_secret | string | length > 0
    fail_msg: >-
      Missing Docker Hub credentials. Define dockerhub_username and one of:
      dockerhub_password or docker_api_token in ansible/group_vars/all.yml (vaulted).

- name: Log in to Docker Hub
  community.docker.docker_login:
    registry_url: https://index.docker.io/v1/
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_auth_secret }}"
  no_log: true

- name: Pull application image
  community.docker.docker_image:
    name: "{{ docker_image }}:{{ docker_image_tag }}"
    source: pull
  register: app_image_pull
  notify: restart app container

- name: Check whether application container already exists
  community.docker.docker_container_info:
    name: "{{ app_container_name }}"
  register: app_container_info

- name: Stop existing container before replacement
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: stopped
  when:
    - app_container_info.exists | bool
    - app_recreate_on_pull | bool
    - app_image_pull.changed
    - app_container_info.container is defined and app_container_info.container.State.Running | default(false)

- name: Remove old container before replacement
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: absent
  when:
    - app_container_info.exists | bool
    - app_recreate_on_pull | bool
    - app_image_pull.changed

- name: Run application container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}:{{ docker_image_tag }}"
    command: "{{ app_container_command | default(omit) }}"
    state: started
    restart_policy: "{{ app_restart_policy }}"
    ports:
      - "{{ app_port }}:{{ app_container_internal_port }}"
    env: "{{ app_environment }}"

- name: Wait for application port
  ansible.builtin.wait_for:
    host: "{{ app_healthcheck_host }}"
    port: "{{ app_port | int }}"
    timeout: 60
    delay: 1
  delegate_to: "{{ app_healthcheck_delegate_to }}"
  become: false

- name: Verify application health endpoint
  ansible.builtin.uri:
    url: "http://{{ app_healthcheck_host }}:{{ app_port }}{{ app_healthcheck_path }}"
    method: GET
    status_code: 200
    return_content: true
    timeout: "{{ app_healthcheck_timeout | int }}"
  register: app_healthcheck
  retries: "{{ app_healthcheck_retries | int }}"
  delay: "{{ app_healthcheck_delay | int }}"
  until: app_healthcheck.status == 200
  failed_when: app_healthcheck.json.status | default("") != "healthy"
  delegate_to: "{{ app_healthcheck_delegate_to }}"
  become: false
