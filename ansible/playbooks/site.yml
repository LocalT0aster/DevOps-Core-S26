---
- name: Provision and deploy application
  hosts: webservers
  become: true
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Run common role tasks/defaults
      ansible.builtin.include_role:
        name: common
        tasks_from: common_tasks
        defaults_from: common_defaults
        apply:
          tags:
            - common
      tags:
        - common
        - packages
        - users

    - name: Run docker role tasks/defaults/handlers
      ansible.builtin.include_role:
        name: docker
        tasks_from: docker_tasks
        defaults_from: docker_defaults
        handlers_from: docker_handlers
        apply:
          tags:
            - docker
      tags:
        - docker
        - docker_install
        - docker_config

    - name: Run app deploy role tasks/defaults/handlers
      ansible.builtin.include_role:
        name: app_deploy
        tasks_from: app_deploy_tasks
        defaults_from: app_deploy_defaults
        handlers_from: app_deploy_handlers
