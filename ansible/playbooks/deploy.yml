---
- name: Deploy application
  hosts: webservers
  become: true
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Run web app role
      ansible.builtin.include_role:
        name: web_app
        tasks_from: web_app_tasks
        defaults_from: web_app_defaults
        apply:
          tags:
            - web_app
      tags:
        - web_app
        - app_deploy
        - compose
