---
- name: Provision web servers
  hosts: webservers
  become: true

  tasks:
    - name: Run common role tasks/defaults
      ansible.builtin.include_role:
        name: common
        tasks_from: common_tasks
        defaults_from: common_defaults

    - name: Run docker role tasks/defaults/handlers
      ansible.builtin.include_role:
        name: docker
        tasks_from: docker_tasks
        defaults_from: docker_defaults
        handlers_from: docker_handlers
