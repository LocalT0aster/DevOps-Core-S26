---
extends: default

ignore: |
  .venv/
  .ansible/
  group_vars/all.yml
  docs/LAB05.md

rules:
  braces:
    max-spaces-inside: 1
  comments:
    min-spaces-from-content: 1
  comments-indentation: false
  document-start:
    present: true
  empty-lines:
    max: 1
    max-start: 0
    max-end: 0
  hyphens:
    max-spaces-after: 1
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: true
  line-length:
    max: 160
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: false
  new-lines:
    type: unix
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true
  trailing-spaces: enable
  truthy:
    allowed-values: ["true", "false"]
    check-keys: true
